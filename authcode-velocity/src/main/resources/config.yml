settings:
  require-velocity-offline-mode: true

premium:
  enabled: true
  check-mode: MOJANG_NAME_LOOKUP
  mojang-api-timeout-ms: 3000
  cache-minutes: 60
  failed-action: REQUIRE_OFFLINE

offline:
  allow-offline-players: true

same-name-login:
  # 是否启用同 ID 兼容登录
  enabled: true

  # 登录路由模式
  # DATABASE_FIRST = 单入口绑定优先；已绑定正版走正版，未绑定走离线改名
  # VIRTUAL_HOST = 按玩家连接的域名区分正版/离线入口
  route-mode: "DATABASE_FIRST"

  # VIRTUAL_HOST 下未知入口的默认处理
  # PREMIUM = 按正版入口处理
  # OFFLINE = 按离线入口处理
  # DENY = 拒绝未配置入口
  default-route: "DENY"

  # 正版入口域名，玩家从这些 host 进入时只查询/创建 PREMIUM 档案
  # 仅 VIRTUAL_HOST 模式使用；DATABASE_FIRST 单入口模式可留空
  premium-hosts: []

  # 离线入口域名，玩家从这些 host 进入时只查询/创建 OFFLINE 档案
  # 仅 VIRTUAL_HOST 模式使用；DATABASE_FIRST 单入口模式可留空
  offline-hosts: []

  # 是否允许同一个 original_name_lower 同时存在 PREMIUM 和 OFFLINE 两份档案
  allow-dual-profile-same-original-name: true

  # 正版入口遇到未知名字时如何处理
  unknown-premium-policy:
    # AUTO_MOJANG_BIND = 直接 forceOnlineMode，正版验证成功后写入 PREMIUM 档案
    # ADMIN_BIND_ONLY = 必须管理员 premium bind 后才允许正版入口
    mode: "AUTO_MOJANG_BIND"

  # 离线入口遇到未知名字时如何处理
  unknown-offline-policy:
    # OFFLINE_PENDING = 创建 pending，踢出提示重进
    # OFFLINE_DIRECT = 直接 forceOfflineMode 并改 GameProfile
    mode: "OFFLINE_PENDING"

  # 是否禁止玩家客户端直接使用离线内部名前缀
  block-client-reserved-prefix: true

  # 系统保留前缀
  reserved-prefix: "o_"

  pending:
    ttl-seconds: 120
    match-ip: true
    cleanup-interval-seconds: 60

offline-name:
  enabled: true
  prefix: "o_"
  avoid-double-prefix: true
  strip-display-prefix: true
  max-name-length: 16
  overflow-mode: "KICK"
  hash-length: 4
  avoid-premium-internal-name: true
  uuid-source: "PREFIXED_INTERNAL_NAME"

forward:
  channel: "authcode:auth"
  secret: "change-this-random-long-secret"
  payload-ttl-seconds: 10
  send-delay-ticks: 2

security:
  deny-premium-name-offline-spoof: true

storage:
  sqlite-file: "authcode.db"
