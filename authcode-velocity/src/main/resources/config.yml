settings:
  require-velocity-offline-mode: true

premium:
  enabled: true
  check-mode: MOJANG_NAME_LOOKUP
  mojang-api-timeout-ms: 3000
  cache-minutes: 60
  failed-action: REQUIRE_OFFLINE

offline:
  allow-offline-players: true

offline-name:
  enabled: true
  prefix: "o_"
  avoid-double-prefix: true
  strip-display-prefix: true
  max-name-length: 16
  overflow-mode: "HASH_SUFFIX"
  hash-length: 4
  avoid-premium-internal-name: true
  uuid-source: "PREFIXED_INTERNAL_NAME"

forward:
  channel: "authcode:auth"
  secret: "change-this-random-long-secret"
  payload-ttl-seconds: 10
  send-delay-ticks: 2

security:
  deny-premium-name-offline-spoof: true
