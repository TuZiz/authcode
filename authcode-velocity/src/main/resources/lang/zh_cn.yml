prefix: "<gradient:#00E5FF:#7C4DFF>AuthCode</gradient> <dark_gray>»</dark_gray> "

velocity:
  checking: "{prefix}<gray>正在检查你的账号类型...</gray>"
  premium-detected: "{prefix}<green>已识别为正版账号，正在进行 Mojang 正版验证。</green>"
  offline-detected: "{prefix}<yellow>你将以离线账号进入服务器，进入后需要邀请码验证。</yellow>"
  mojang-failed-deny: "{prefix}<red>正版状态查询失败，请稍后重试。</red>"
  config-error: "{prefix}<red>AuthCode Velocity 配置错误，请联系管理员。</red>"
  invalid-name: "{prefix}<red>你的名字包含不支持的字符，请更换名字后重试。</red>"
  name-too-long: "{prefix}<red>你的名字加上离线前缀后过长，请换一个短一点的名字。</red>"
  internal-name-conflict: "{prefix}<red>生成离线内部名失败，请换一个名字后重试。</red>"

  admin:
    help: "{prefix}<gray>/authcode premium bind|unbind|info <name> · /authcode profile <name> · /authcode namecheck <name> · /authcode pending list|clear <name> · /authcode identity <player></gray>"
    unknown: "{prefix}<red>未知命令。</red>"
    database-error: "{prefix}<red>数据库异常，请查看 Velocity 控制台。</red>"
    usage-premium: "{prefix}<yellow>用法：</yellow><white>/authcode premium bind|unbind|info <name></white>"
    usage-profile: "{prefix}<yellow>用法：</yellow><white>/authcode profile <name></white>"
    usage-namecheck: "{prefix}<yellow>用法：</yellow><white>/authcode namecheck <name></white>"
    usage-pending: "{prefix}<yellow>用法：</yellow><white>/authcode pending list</white><gray> 或 </gray><white>/authcode pending clear <name></white>"
    usage-identity: "{prefix}<yellow>用法：</yellow><white>/authcode identity <player></white>"
    premium-bind-success: "{prefix}<green>已将 {name} 绑定为正版账号，UUID：{uuid}</green>"
    premium-bind-mojang-missing: "{prefix}<red>{name} 不存在 Mojang 正版档案，不能绑定。</red>"
    premium-bind-mojang-failed: "{prefix}<red>Mojang 查询失败，暂时不能绑定 {name}。</red>"
    premium-unbind-success: "{prefix}<green>已解除 {name} 的正版绑定；后续未知登录会重新创建离线 pending。</green>"
    profile-not-found: "{prefix}<red>没有找到身份档案：{name}</red>"
    profile-result: "{prefix}<gray>originalName:</gray> <white>{original_name}</white> <gray>internalName:</gray> <white>{internal_name}</white> <gray>displayName:</gray> <white>{display_name}</white> <gray>uuid:</gray> <white>{uuid}</white> <gray>authType:</gray> <white>{auth_type}</white> <gray>premiumBound:</gray> <white>{premium_bound}</white>"
    namecheck-result: "{prefix}<gray>name:</gray> <white>{name}</white> <gray>valid:</gray> <white>{valid}</white> <gray>reservedPrefix:</gray> <white>{reserved}</white> <gray>hasProfile:</gray> <white>{has_profile}</white> <gray>premiumBound:</gray> <white>{premium_bound}</white> <gray>offlineName:</gray> <white>{offline_name}</white> <gray>overflow:</gray> <white>{overflow}</white> <gray>displayName:</gray> <white>{display_name}</white>"
    pending-empty: "{prefix}<gray>当前没有 pending 离线映射。</gray>"
    pending-header: "{prefix}<green>pending 离线映射：</green>"
    pending-line: "<gray>-</gray> <white>{name}</white> <gray>-></gray> <white>{offline_name}</white> <gray>ip:</gray> <white>{ip}</white> <gray>expiresAt:</gray> <white>{expires_at}</white>"
    pending-cleared: "{prefix}<green>已清理 {name} 的 pending 记录：{count} 条。</green>"
    identity-not-found: "{prefix}<red>没有找到在线身份：{name}</red>"
    identity-result: "{prefix}<gray>originalName:</gray> <white>{original_name}</white> <gray>internalName:</gray> <white>{internal_name}</white> <gray>displayName:</gray> <white>{display_name}</white> <gray>uuid:</gray> <white>{uuid}</white> <gray>premium:</gray> <white>{premium}</white> <gray>authSource:</gray> <white>{auth_source}</white>"
    boolean-true: "true"
    boolean-false: "false"

same-name-login:
  invalid-name: "{prefix}<red>用户名不合法，只能使用 3-16 位英文、数字和下划线。</red>"
  reserved-prefix: "{prefix}<red>{reserved_prefix} 前缀为系统离线身份保留，不能直接使用。请使用原始名字进入服务器。</red>"
  premium-bound-kick: "{prefix}<red>该账号已绑定正版，请使用正版客户端登录。</red>"
  premium-route-denied: "{prefix}<red>该入口仅允许正版账号登录，请使用正版账号或联系管理员。</red>"
  unknown-host-denied: "{prefix}<red>当前入口未配置登录路由，请使用正确的正版或离线入口。</red>"
  offline-name-too-long: "{prefix}<red>你的名字加上离线前缀后过长，请更换更短的名字。</red>"
  offline-pending-created: "{prefix}<yellow>你是离线用户，账号名已映射为 {offline_name}，请重新加入服务器。</yellow>"
  pending-expired: "{prefix}<red>离线映射已过期，请重新加入服务器。</red>"
  profile-created: "{prefix}<green>已创建离线身份：{internal_name}。</green>"
