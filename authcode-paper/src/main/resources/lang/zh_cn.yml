prefix: "<gradient:#00E5FF:#7C4DFF>AuthCode</gradient> <dark_gray>»</dark_gray> "

general:
  no-permission: "{prefix}<red>你没有权限。</red>"
  player-only: "{prefix}<red>该命令只能由玩家执行。</red>"
  unknown-command: "{prefix}<red>未知命令。</red>"
  reload-success: "{prefix}<green>配置与语言文件已重载。</green>"
  reload-start: "{prefix}<gray>正在异步重载配置与语言文件...</gray>"
  database-error: "{prefix}<red>数据库异常，请联系管理员。</red>"
  internal-error: "{prefix}<red>插件内部异常，请联系管理员。</red>"
  plugin-not-ready: "{prefix}<red>插件尚未初始化完成，请稍后再试。</red>"

auth:
