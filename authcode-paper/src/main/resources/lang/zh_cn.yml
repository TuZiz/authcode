  password-too-long: "{prefix}<red>密码太长，最多允许 {max} 位。</red>"
  change-password-success: "{prefix}<green>密码修改成功。</green>"
  change-password-not-available: "{prefix}<red>当前账号不能修改密码。</red>"
  old-password-invalid: "{prefix}<red>旧密码不正确。</red>"
