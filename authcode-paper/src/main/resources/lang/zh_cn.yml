  code-invalid: "{prefix}<red>邀请码不存在或不可用。</red>"
  code-disabled: "{prefix}<red>邀请码已禁用。</red>"
  code-expired: "{prefix}<red>邀请码已过期。</red>"
  code-used-up: "{prefix}<red>邀请码使用次数已耗尽。</red>"
  code-not-needed: "{prefix}<red>你当前不能使用邀请码。</red>"
  need-register: "{prefix}<yellow>请先注册密码：</yellow><white>/reg 密码 确认密码</white>"
