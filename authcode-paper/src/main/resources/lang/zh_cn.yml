  offline-need-login: "{prefix}<yellow>请使用 /login 密码 登录。</yellow>"

offline-name:
  prefix-applied: "{prefix}<gray>你的离线账号已使用安全内部身份名 {internal_name}，游戏内显示为 {display_name}。</gray>"
  name-too-long: "{prefix}<red>你的名字加上离线前缀后过长，请换一个短一点的名字。</red>"
  internal-name-conflict: "{prefix}<red>生成离线内部名失败，请换一个名字后重试。</red>"
  premium-name-protected: "{prefix}<yellow>该名字存在 Mojang 正版档案，离线账号将使用安全内部名进入。</yellow>"
  invalid-name: "{prefix}<red>你的名字包含不支持的字符，请更换名字后重试。</red>"

identity:
  premium-prefix: "[正版]"
  offline-prefix: "[离线]"
  premium-display: "[正版] {display_name}"
  offline-display: "[离线] {display_name}"
  chat-separator: "<gray>: </gray>"
  debug-header: "{prefix}<gray>玩家身份信息：</gray>"
  debug-original-name: "<gray>originalName:</gray> <white>{original_name}</white>"
  debug-internal-name: "<gray>internalName:</gray> <white>{internal_name}</white>"
  debug-display-name: "<gray>displayName:</gray> <white>{display_name}</white>"
  debug-premium: "<gray>premium:</gray> <white>{premium}</white>"
  debug-uuid: "<gray>uuid:</gray> <white>{uuid}</white>"
  debug-auth-source: "<gray>authSource:</gray> <white>{auth_source}</white>"
  debug-chat-name: "<gray>chatName:</gray> <white>{identity_name_plain}</white>"

display:
  identity:
    premium-prefix: "<green>[正版]</green> "
    offline-prefix: "<gray>[离线]</gray> "
    premium-type: "正版"
    offline-type: "离线"
    identity-debug:
      - "<gray>玩家身份信息：</gray>"
      - "<gray>originalName:</gray> <white>{original_name}</white>"
      - "<gray>internalName:</gray> <white>{internal_name}</white>"
      - "<gray>displayName:</gray> <white>{display_name}</white>"
      - "<gray>premium:</gray> <white>{premium}</white>"
      - "<gray>uuid:</gray> <white>{uuid}</white>"
      - "<gray>authSource:</gray> <white>{auth_source}</white>"

proxy:
  waiting: "{prefix}<gray>正在等待 Velocity 认证结果...</gray>"
  verified-premium: "{prefix}<green>Velocity 已确认你是正版玩家，已自动放行。</green>"
  verified-offline: "{prefix}<yellow>你是离线账号，请输入邀请码：</yellow><white>/code 邀请码</white>"
  missing-assertion-kick: "<red>未收到 Velocity 认证数据，请通过正确的服务器入口进入。</red>"
  invalid-signature-kick: "<red>Velocity 认证签名无效，请联系管理员。</red>"
  expired-payload-kick: "<red>Velocity 认证数据已过期，请重新进入服务器。</red>"
  uuid-mismatch-kick: "<red>Velocity 认证身份不匹配，请重新进入服务器。</red>"

command:
  code-usage: "{prefix}<yellow>用法：</yellow><white>/code 邀请码</white>"
  reg-usage: "{prefix}<yellow>用法：</yellow><white>/reg 密码 确认密码</white>"
  login-usage: "{prefix}<yellow>用法：</yellow><white>/login 密码</white>"
  changepass-usage: "{prefix}<yellow>用法：</yellow><white>/changepass 旧密码 新密码 确认新密码</white>"

