  premium-risk-warning: "{prefix}<yellow>注意：当前服务器为离线模式，正版识别仅基于用户名查询。</yellow>"
  premium-failed-allow: "{prefix}<yellow>Mojang API 查询失败，已按配置直接放行。</yellow>"
  premium-failed-kick: "<red>Mojang API 查询失败，请稍后重试。</red>"
  need-code: "{prefix}<yellow>你需要输入邀请码：</yellow><white>/code 邀请码</white>"
